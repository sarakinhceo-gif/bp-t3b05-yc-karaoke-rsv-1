    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            background-color: #111111;
            color: #ffff00;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.3;
            max-width: none;
            overflow-x: hidden;
            padding: 0;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4, p, li, a, span, button, input, textarea, select {
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        h1 {
            font-size: clamp(3.5rem, 12vw, 6rem);
            line-height: 0.9;
            margin-bottom: 16px;
            color: #ffff00;
            text-shadow: 6px 6px 0 #00ff41;
            transform: rotate(-2deg);
        }
        h2 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin-bottom: 24px;
            border-bottom: 4px solid #00ff41;
            padding-bottom: 8px;
            display: inline-block;
            transform: skewX(-5deg);
        }
        h3 {
            font-size: 1.75rem;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.125rem;
            margin-bottom: 16px;
            color: #e0e0e0;
        }
        a {
            color: #ffff00;
            text-decoration: underline;
            text-underline-offset: 6px;
            transition: color 0.1s;
        }
        a:hover {
            color: #00ff41;
        }
        strong, em {
            color: #00ff41;
            font-style: normal;
        }
        .highlight {
            background: #ffff00;
            color: #111111;
            padding: 0 8px;
            display: inline-block;
        }

        /* ===== LAYOUT ===== */
        .container {
            padding: 24px;
            max-width: 100%;
        }
        section {
            margin-bottom: 40px;
            padding: 24px;
            border: 4px solid #ffff00;
            background: #1a1a1a;
            position: relative;
        }
        section::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            width: calc(100% + 16px);
            height: calc(100% + 16px);
            border: 2px solid #00ff41;
            pointer-events: none;
            z-index: -1;
        }

        /* ===== HEADER & NAV ===== */
        header {
            padding: 24px;
            border-bottom: 6px solid #00ff41;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            background: #111111;
            position: relative;
            z-index: 100;
        }
        .logo a {
            font-size: 2rem;
            font-weight: 900;
            color: #ffff00;
            text-decoration: none;
            letter-spacing: -0.05em;
            border: 4px solid #ffff00;
            padding: 8px 16px;
            transform: rotate(-1deg);
            display: inline-block;
        }
        .logo a:hover {
            background: #ffff00;
            color: #111111;
        }

        nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }
        nav a {
            font-size: 1.25rem;
            font-weight: 700;
            color: #00ff41;
            text-decoration: none;
            border-bottom: 3px solid transparent;
            padding-bottom: 4px;
            transition: 0.1s;
        }
        nav a:hover {
            border-bottom-color: #ffff00;
            color: #ffff00;
        }
        .hamburger {
            display: none;
            background: none;
            border: 4px solid #00ff41;
            color: #00ff41;
            font-size: 2rem;
            padding: 4px 12px;
            cursor: pointer;
            line-height: 1;
        }
        .hamburger:hover {
            background: #00ff41;
            color: #111111;
        }
        #nav-toggle {
            display: none;
        }

        /* ===== HERO ===== */
        .hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: center;
            padding: 40px 24px;
            border: 4px solid #ffff00;
            background: #111111;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: repeating-linear-gradient(
                45deg,
                #00ff41 0px,
                #00ff41 4px,
                transparent 4px,
                transparent 12px
            );
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }
        .hero-text {
            position: relative;
            z-index: 1;
        }
        .hero-visual {
            position: relative;
            z-index: 1;
            text-align: center;
            font-size: 8rem;
            line-height: 1;
            transform: rotate(3deg) scaleX(-1);
            filter: drop-shadow(0 0 20px #ffff00);
        }
        .hero-cta {
            display: inline-block;
            margin-top: 24px;
            padding: 16px 48px;
            background: #00ff41;
            color: #111111;
            font-weight: 900;
            font-size: 1.5rem;
            text-decoration: none;
            border: 4px solid #ffff00;
            transform: skewX(-8deg);
            transition: 0.1s;
        }
        .hero-cta:hover {
            background: #ffff00;
            border-color: #00ff41;
            transform: skewX(0deg) scale(1.02);
        }

        /* ===== REVIEWS ===== */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }
        .review-card {
            background: #111111;
            border: 4px solid #ffff00;
            padding: 16px;
            transform: rotate(var(--rot, 0deg));
            transition: 0.2s;
        }
        .review-card:hover {
            transform: rotate(0deg) scale(1.02);
            border-color: #00ff41;
        }
        .review-card:nth-child(odd) {
            --rot: -1deg;
        }
        .review-card:nth-child(even) {
            --rot: 1.5deg;
        }
        .review-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 8px;
            border-bottom: 2px solid #333;
            padding-bottom: 6px;
        }
        .review-stars {
            color: #ffff00;
            font-size: 1.2rem;
            letter-spacing: 4px;
        }
        .review-text {
            font-size: 1rem;
            color: #ccc;
            font-weight: 400;
        }

        /* ===== FEATURES / ABOUT ===== */
        .features-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 24px 0;
        }
        .features-list li {
            padding: 16px;
            border: 3px solid #00ff41;
            background: #111;
            font-size: 1.125rem;
            font-weight: 700;
            color: #ffff00;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .features-list li::before {
            content: '▶';
            color: #00ff41;
            font-size: 1.5rem;
        }

        /* ===== CTA SECTION ===== */
        .cta-big {
            text-align: center;
            padding: 64px 24px;
            border: 4px solid #00ff41;
            background: #111111;
            position: relative;
        }
        .cta-big h2 {
            border-bottom: none;
            display: block;
            transform: none;
            font-size: clamp(2.5rem, 8vw, 5rem);
        }
        .cta-big a.tel-link {
            font-size: clamp(2rem, 6vw, 4rem);
            color: #00ff41;
            text-decoration: none;
            border: 4px solid #ffff00;
            padding: 16px 40px;
            display: inline-block;
            margin-top: 24px;
            background: #111;
            transition: 0.1s;
        }
        .cta-big a.tel-link:hover {
            background: #ffff00;
            color: #111;
            border-color: #00ff41;
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 32px 24px;
            border-top: 6px solid #00ff41;
            text-align: center;
            color: #888;
            font-size: 0.875rem;
        }
        footer a {
            color: #888;
        }
        footer a:hover {
            color: #ffff00;
        }

        /* ===== BUTTONS & UTILITIES ===== */
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #00ff41;
            color: #111111;
            font-weight: 900;
            font-size: 1.25rem;
            text-decoration: none;
            border: 4px solid #ffff00;
            transition: 0.1s;
            cursor: pointer;
        }
        .btn:hover {
            background: #ffff00;
            border-color: #00ff41;
        }

        .skew-block {
            transform: skewX(-4deg);
        }
        .rot-1 { transform: rotate(-2deg); }
        .rot-2 { transform: rotate(1.5deg); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            .container {
                padding: 12px;
            }
            section {
                padding: 16px;
                margin-bottom: 24px;
            }
            h1 {
                font-size: 2.8rem;
                transform: none;
            }
            h2 {
                font-size: 1.8rem;
            }
            .hero {
                grid-template-columns: 1fr;
                padding: 24px 12px;
                text-align: center;
            }
            .hero-visual {
                font-size: 5rem;
                transform: none;
                order: -1;
            }
            .hero-cta {
                font-size: 1.2rem;
                padding: 12px 32px;
            }
            .features-list {
                grid-template-columns: 1fr;
            }
            .reviews-grid {
                grid-template-columns: 1fr;
            }
            .review-card {
                transform: none !important;
            }

            /* 햄버거 메뉴 */
            .hamburger {
                display: block;
            }
            nav {
                display: none;
                flex-direction: column;
                width: 100%;
                gap: 8px;
                padding: 16px 0;
                border-top: 4px solid #00ff41;
                margin-top: 16px;
            }
            nav a {
                font-size: 1.5rem;
                padding: 8px 0;
                border-bottom: 2px solid #333;
            }
            #nav-toggle:checked ~ nav {
                display: flex;
            }
            /* 헤더 구조 재정렬 */
            header {
                position: relative;
            }
            .hamburger {
                order: 1;
            }
            .logo {
                flex: 1;
            }
            #nav-toggle {
                display: none;
            }
            /* 헤더 내에서 input+label을 위해 label을 hamburger로 함 */
            .hamburger-label {
                display: flex;
                align-items: center;
                cursor: pointer;
            }
            .hamburger-label span {
                font-size: 2rem;
            }
            /* 실제 체크박스 숨기고 라벨 사용 */
            .hamburger-checkbox {
                display: none;
            }
            .hamburger-checkbox:checked ~ nav {
                display: flex;
            }
        }

        /* ===== CUSTOM SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #111;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff41;
            border: 2px solid #ffff00;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ffff00;
        }

        /* ===== EXTRA BRUTAL ===== */
        .border-double {
            border-style: double;
            border-width: 6px;
            border-color: #ffff00 #00ff41;
        }
        .glitch-text {
            position: relative;
            display: inline-block;
        }
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111;
        }
        .glitch-text::before {
            color: #00ff41;
            z-index: -1;
            transform: translate(4px, -2px);
        }
        .glitch-text::after {
            color: #ffff00;
            z-index: -2;
            transform: translate(-4px, 2px);
        }

        /* ===== HELPERS ===== */
        .mb-0 { margin-bottom: 0; }
        .
